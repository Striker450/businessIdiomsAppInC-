        let favorites = JSON.parse(localStorage.getItem('favorites')) || [];

        function initLetterButtons() {
            const grid = document.getElementById('letterGrid');
            const letters = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('');
            letters.forEach(letter => {
                const btn = document.createElement('button');
                btn.textContent = letter;
                btn.className = 'letter-btn';
                btn.onclick = () => searchByLetter(letter);
                grid.appendChild(btn);
            });
        }

        function searchByLetter(letter) {
            const results = idioms.filter(idiom => 
                idiom.toLowerCase().startsWith(letter.toLowerCase())
            );
            displayIdioms(results);
            document.getElementById('foundCount').textContent = results.length;
        }

        function displayIdioms(results) {
            const container = document.getElementById('idiomsContainer');
            
            if (results.length === 0) {
                container.innerHTML = '<div class="no-results">No idioms found</div>';
                return;
            }

            container.innerHTML = results.map((idiom, index) => {
                const isFavorite = favorites.includes(idiom);
                return `
                    <div class="idiom-item">
                        <div style="display: flex; justify-content: space-between; align-items: start;">
                            <div>
                                <div class="idiom-text">${idiom}</div>
                            </div>
                            <button class="favorite-btn" onclick="toggleFavorite('${idiom.replace(/'/g, "\\'")}')">
                                ${isFavorite ? '❤️' : '🤍'}
                            </button>
                        </div>
                        <button class="copy-btn" onclick="copyToClipboard('${idiom.replace(/'/g, "\\'")}')">Copy</button>
                    </div>
                `;
            }).join('');
        }

        function toggleFavorite(idiom) {
            if (favorites.includes(idiom)) {
                favorites = favorites.filter(fav => fav !== idiom);
            } else {
                favorites.push(idiom);
            }
            localStorage.setItem('favorites', JSON.stringify(favorites));
            document.getElementById('favoriteCount').textContent = favorites.length;
            
            const searchInput = document.getElementById('searchInput');
            if (searchInput.value) {
                searchIdioms();
            } else {
                displayIdioms(idioms);
            }
        }

        function copyToClipboard(text) {
            navigator.clipboard.writeText(text);
            alert('Copied to clipboard!');
        }

        function searchIdioms() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            if (!searchTerm) {
                displayIdioms(idioms);
                return;
            }
            const results = idioms.filter(idiom => 
                idiom.toLowerCase().includes(searchTerm)
            );
            displayIdioms(results);
            document.getElementById('foundCount').textContent = results.length;
        }

        function showAllIdioms() {
            displayIdioms(idioms);
            document.getElementById('searchInput').value = '';
            document.getElementById('foundCount').textContent = idioms.length;
        }

        function clearSearch() {
            document.getElementById('searchInput').value = '';
            document.getElementById('idiomsContainer').innerHTML = 
                '<div class="no-results">Select a letter or search to begin</div>';
            document.getElementById('foundCount').textContent = 0;
        }

        function showFavorites() {
            if (favorites.length === 0) {
                alert('No favorites yet! Add some by clicking the heart icon.');
                return;
            }
            displayIdioms(favorites);
            document.getElementById('foundCount').textContent = favorites.length;
        }

        document.getElementById('searchInput').addEventListener('input', searchIdioms);

        initLetterButtons();
        document.getElementById('favoriteCount').textContent = favorites.length;
    </script>

name: Build BusinessIdiomsApp

on: [push]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v3
      - name: Compile
        run: |
          g++ -o BusinessIdiomsApp.exe BusinessIdiomsApp.cpp
      - name: Upload
        uses: actions/upload-artifact@v3
        with:
          name: BusinessIdiomsApp
          path: BusinessIdiomsApp.exe
